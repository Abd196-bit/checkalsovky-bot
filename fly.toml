app = "checkalsovky-bot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  CHECKALSOVKY_HOST = "0.0.0.0"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048
